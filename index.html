<script>
(() => {
  const btn = document.getElementById("menuBtn");
  const menu = document.getElementById("mobileMenu");
  if (!btn || !menu) return;

  function closeMenu() {
    menu.hidden = true;
    btn.setAttribute("aria-expanded", "false");
  }

  function toggleMenu() {
    const willOpen = menu.hidden;
    menu.hidden = !willOpen;
    btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
  }

  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    toggleMenu();
  });

  menu.querySelectorAll("a").forEach(a => a.addEventListener("click", closeMenu));
  document.addEventListener("click", closeMenu);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeMenu();
  });
  window.addEventListener("resize", closeMenu);
})();
</script>

<script>
const supabaseUrl = "https://kqtzyhmksnjowielrwii.supabase.co";
const supabaseKey = "sb_publishable_vgSmqItheOG3aeOdoNionA_rd-4MTL2";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

const seasonSelect = document.getElementById("seasonSelect");
const tbody = document.getElementById("tbody");
const playerCard = document.getElementById("playerCard");
const playerHint = document.getElementById("playerHint");
const playerContent = document.getElementById("playerContent");
const playerStatsBtn = document.getElementById("playerStatsBtn");
const playerRelationsBtn = document.getElementById("playerRelationsBtn");

const roundSelect = document.getElementById("roundSelect");
const prevRoundBtn = document.getElementById("prevRoundBtn");
const nextRoundBtn = document.getElementById("nextRoundBtn");
const matchesMeta = document.getElementById("matchesMeta");
const matchesList = document.getElementById("matchesList");

const newsWall = document.getElementById("newsWall");

let seasons = [];
let selectedSeasonId = null;
let selectedSeasonYear = null;
let selectedPlayerId = null;
let playerCardView = "stats";

let allSeasonMatches = [];
let allSeasonMP = [];
let availableRounds = [];
let selectedRound = null;

let cachedAllMatches = [];
let cachedAllMatchPlayers = [];
let cachedAllPlayers = [];

let statsBundleCache = new Map();
let playerProfileCache = new Map();
let playerFormCache = new Map();
let cacheDataVersion = 0;

let chSeasons = null;
let chSeasonStats = null;
let chMatches = null;
let chMatchPlayers = null;
let chAnnouncements = null;

let tableTimer = null;
let matchesTimer = null;
let playerTimer = null;

function scheduleTable(fn, delay = 200) {
  if (tableTimer) clearTimeout(tableTimer);
  tableTimer = setTimeout(fn, delay);
}

function scheduleMatches(fn, delay = 250) {
  if (matchesTimer) clearTimeout(matchesTimer);
  matchesTimer = setTimeout(fn, delay);
}

function schedulePlayer(fn, delay = 350) {
  if (playerTimer) clearTimeout(playerTimer);
  playerTimer = setTimeout(fn, delay);
}

function stopRealtime() {
  if (chSeasons) supabaseClient.removeChannel(chSeasons);
  if (chSeasonStats) supabaseClient.removeChannel(chSeasonStats);
  if (chMatches) supabaseClient.removeChannel(chMatches);
  if (chMatchPlayers) supabaseClient.removeChannel(chMatchPlayers);
  if (chAnnouncements) supabaseClient.removeChannel(chAnnouncements);
  chSeasons = chSeasonStats = chMatches = chMatchPlayers = chAnnouncements = null;
}

function startRealtime() {
  stopRealtime();

  chSeasons = supabaseClient
    .channel("public:seasons-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "seasons" }, async () => {
      const prevSeasonId = selectedSeasonId;

      await loadSeasons();
      await loadBaseStatsData();
      await loadTable();
      await loadMatches();
      if (selectedPlayerId) await loadPlayerCard(selectedPlayerId);

      if (prevSeasonId !== selectedSeasonId) {
        setTimeout(() => startRealtime(), 150);
      }
    })
    .subscribe();

  chSeasonStats = supabaseClient
    .channel("public:season-stats-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "season_stats" }, (payload) => {
      const sid = payload?.new?.season_id || payload?.old?.season_id;
      if (sid && sid === selectedSeasonId) {
        scheduleTable(() => loadTable(), 200);
      }
    })
    .subscribe();

  chMatches = supabaseClient
    .channel("public:matches-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "matches" }, async (payload) => {
      const sid = payload?.new?.season_id || payload?.old?.season_id;
      if (sid && sid === selectedSeasonId) {
        scheduleMatches(async () => {
          await loadBaseStatsData();
          await loadMatches();
          if (selectedPlayerId) await loadPlayerCard(selectedPlayerId);
        }, 250);
      }
    })
    .subscribe();

  chMatchPlayers = supabaseClient
    .channel("public:match-players-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "match_players" }, () => {
      scheduleMatches(async () => {
        await loadBaseStatsData();
        await loadMatches();
      }, 300);

      if (selectedPlayerId) {
        schedulePlayer(() => loadPlayerCard(selectedPlayerId), 450);
      }
    })
    .subscribe();

  chAnnouncements = supabaseClient
    .channel("public:announcements-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "announcements" }, () => {
      loadAnnouncementPublic();
    })
    .subscribe();
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatRecord(stat){
  if (!stat) return "—";
  return `${stat.wins} Gy / ${stat.draws} D / ${stat.losses} V`;
}

function percentage(numerator, denominator){
  if (!denominator) return "0%";
  return `${Math.round((numerator / denominator) * 100)}%`;
}

function average(total, matches){
  if (!matches) return "0.00";
  return (total / matches).toFixed(2);
}

function compareBestTeammate(a, b){
  const aPpm = a.matches ? a.points / a.matches : -1;
  const bPpm = b.matches ? b.points / b.matches : -1;
  if (bPpm !== aPpm) return bPpm - aPpm;
  const aGd = a.matches ? a.goalDiff / a.matches : -999;
  const bGd = b.matches ? b.goalDiff / b.matches : -999;
  if (bGd !== aGd) return bGd - aGd;
  if (b.wins !== a.wins) return b.wins - a.wins;
  return b.matches - a.matches;
}

function compareWorstOpponent(a, b){
  const aPpm = a.matches ? a.points / a.matches : 999;
  const bPpm = b.matches ? b.points / b.matches : 999;
  if (aPpm !== bPpm) return aPpm - bPpm;
  const aGd = a.matches ? a.goalDiff / a.matches : 999;
  const bGd = b.matches ? b.goalDiff / b.matches : 999;
  if (aGd !== bGd) return aGd - bGd;
  if (b.losses !== a.losses) return b.losses - a.losses;
  return b.matches - a.matches;
}

function createEmptyPlayerStats(player){
  return {
    playerId: player.id,
    name: player.name,
    matches: 0,
    wins: 0,
    draws: 0,
    losses: 0,
    goalsFor: 0,
    goalsAgainst: 0,
    goalDiff: 0,
    points: 0,
    blackCount: 0,
    whiteCount: 0,
    teammates: new Map(),
    opponents: new Map()
  };
}

function getResultFromTeam(team, blackScore, whiteScore){
  if (blackScore === whiteScore) return "draw";
  const isBlackWin = blackScore > whiteScore;
  if ((team === "black" && isBlackWin) || (team === "white" && !isBlackWin)) {
    return "win";
  }
  return "loss";
}

function addPairStat(targetMap, otherId, otherName, outcome, goalsFor, goalsAgainst){
  if (!targetMap.has(otherId)) {
    targetMap.set(otherId, {
      playerId: otherId,
      name: otherName,
      matches: 0,
      wins: 0,
      draws: 0,
      losses: 0,
      goalsFor: 0,
      goalsAgainst: 0,
      goalDiff: 0,
      points: 0
    });
  }

  const item = targetMap.get(otherId);
  item.matches += 1;
  item.goalsFor += goalsFor;
  item.goalsAgainst += goalsAgainst;
  item.goalDiff = item.goalsFor - item.goalsAgainst;

  if (outcome === "win") {
    item.wins += 1;
    item.points += 3;
  } else if (outcome === "draw") {
    item.draws += 1;
    item.points += 1;
  } else {
    item.losses += 1;
  }
}


function clearStatsCaches(){
  statsBundleCache.clear();
  playerProfileCache.clear();
  playerFormCache.clear();
  cacheDataVersion += 1;
}

function getBundleCacheKey(seasonId){
  return seasonId == null ? "overall" : `season:${seasonId}`;
}

function getStatsBundleCached(seasonId = null){
  const key = getBundleCacheKey(seasonId);
  if (!statsBundleCache.has(key)) {
    statsBundleCache.set(key, getFilteredStatsBundle(
      cachedAllMatches,
      cachedAllMatchPlayers,
      cachedAllPlayers,
      seasonId
    ));
  }
  return statsBundleCache.get(key);
}

function getPlayerProfileCached(seasonId, playerId){
  const bundleKey = getBundleCacheKey(seasonId);
  const cacheKey = `${cacheDataVersion}|${bundleKey}|${playerId}`;
  if (playerProfileCache.has(cacheKey)) {
    return playerProfileCache.get(cacheKey);
  }

  const bundle = getStatsBundleCached(seasonId);
  const stats = bundle.playerStatsMap.get(playerId) || null;
  if (!stats) {
    playerProfileCache.set(cacheKey, null);
    return null;
  }

  const favoriteTeammate = [...stats.teammates.values()].sort(compareBestTeammate)[0] || null;
  const toughestOpponent = [...stats.opponents.values()].sort(compareWorstOpponent)[0] || null;

  const profile = { stats, favoriteTeammate, toughestOpponent };
  playerProfileCache.set(cacheKey, profile);
  return profile;
}

function getPlayerRecentFormCached(playerId){
  const cacheKey = `${cacheDataVersion}|overall|${playerId}`;
  if (playerFormCache.has(cacheKey)) {
    return playerFormCache.get(cacheKey);
  }

  const overallBundle = getStatsBundleCached(null);
  const matchById = new Map(overallBundle.matches.map(match => [match.id, match]));
  const recentRows = overallBundle.matchPlayers
    .filter(mp => mp.player_id === playerId)
    .sort((a, b) => {
      const matchA = matchById.get(a.match_id);
      const matchB = matchById.get(b.match_id);
      return new Date(matchB?.created_at || 0) - new Date(matchA?.created_at || 0);
    })
    .slice(0, 5);

  const form = recentRows
    .map(row => {
      const match = matchById.get(row.match_id);
      if (!match) return null;
      const result = getResultFromTeam(row.team, match.black_score, match.white_score);
      if (result === "draw") return { code: "D", cls: "draw", title: "Döntetlen" };
      return result === "win"
        ? { code: "W", cls: "win", title: "Győzelem" }
        : { code: "L", cls: "loss", title: "Vereség" };
    })
    .filter(Boolean);

  playerFormCache.set(cacheKey, form);
  return form;
}

function getFilteredStatsBundle(matches, matchPlayers, players, seasonId = null){
  const filteredMatches = seasonId
    ? matches.filter(m => String(m.season_id) === String(seasonId))
    : [...matches];

  const matchIds = new Set(filteredMatches.map(m => m.id));
  const filteredMP = matchPlayers.filter(mp => matchIds.has(mp.match_id));

  const playerStatsMap = new Map();
  players.forEach(player => {
    playerStatsMap.set(player.id, createEmptyPlayerStats(player));
  });

  const playersById = new Map(players.map(p => [p.id, p]));
  const matchPlayersByMatch = new Map();

  filteredMP.forEach(mp => {
    if (!matchPlayersByMatch.has(mp.match_id)) {
      matchPlayersByMatch.set(mp.match_id, []);
    }
    matchPlayersByMatch.get(mp.match_id).push(mp);
  });

  const pairMap = new Map();
  const h2hMap = new Map();

  filteredMatches.forEach(match => {
    const participants = matchPlayersByMatch.get(match.id) || [];
    const blackPlayers = participants.filter(p => p.team === "black");
    const whitePlayers = participants.filter(p => p.team === "white");

    participants.forEach(mp => {
      const stats = playerStatsMap.get(mp.player_id);
      if (!stats) return;

      const goalsFor = mp.team === "black" ? match.black_score : match.white_score;
      const goalsAgainst = mp.team === "black" ? match.white_score : match.black_score;
      const result = getResultFromTeam(mp.team, match.black_score, match.white_score);

      stats.matches += 1;
      stats.goalsFor += goalsFor;
      stats.goalsAgainst += goalsAgainst;
      stats.goalDiff = stats.goalsFor - stats.goalsAgainst;
      if (mp.team === "black") stats.blackCount += 1;
      if (mp.team === "white") stats.whiteCount += 1;

      if (result === "win") {
        stats.wins += 1;
        stats.points += 3;
      } else if (result === "draw") {
        stats.draws += 1;
        stats.points += 1;
      } else {
        stats.losses += 1;
      }

      const teammates = participants.filter(p => p.team === mp.team && p.player_id !== mp.player_id);
      teammates.forEach(tp => {
        const teammateName = tp.tabella?.name || playersById.get(tp.player_id)?.name || "Ismeretlen";
        addPairStat(stats.teammates, tp.player_id, teammateName, result, goalsFor, goalsAgainst);

        const ids = [mp.player_id, tp.player_id].sort();
        const key = ids.join("|");
        if (!pairMap.has(key)) {
          pairMap.set(key, {
            playerAId: ids[0],
            playerBId: ids[1],
            playerAName: playersById.get(ids[0])?.name || "—",
            playerBName: playersById.get(ids[1])?.name || "—",
            matches: 0,
            wins: 0,
            draws: 0,
            losses: 0,
            goalsFor: 0,
            goalsAgainst: 0,
            goalDiff: 0,
            points: 0
          });
        }
        const pair = pairMap.get(key);
        if (mp.player_id === ids[0]) {
          pair.matches += 0.5;
          pair.goalsFor += goalsFor / 2;
          pair.goalsAgainst += goalsAgainst / 2;
          pair.goalDiff = pair.goalsFor - pair.goalsAgainst;
          if (result === "win") {
            pair.wins += 0.5;
            pair.points += 1.5;
          } else if (result === "draw") {
            pair.draws += 0.5;
            pair.points += 0.5;
          } else {
            pair.losses += 0.5;
          }
        }
      });

      const opponents = participants.filter(p => p.team !== mp.team);
      opponents.forEach(op => {
        const opponentName = op.tabella?.name || playersById.get(op.player_id)?.name || "Ismeretlen";
        addPairStat(stats.opponents, op.player_id, opponentName, result, goalsFor, goalsAgainst);

        const ids = [mp.player_id, op.player_id].sort();
        const key = ids.join("|");
        if (!h2hMap.has(key)) {
          h2hMap.set(key, {
            playerAId: ids[0],
            playerBId: ids[1],
            playerAName: playersById.get(ids[0])?.name || "—",
            playerBName: playersById.get(ids[1])?.name || "—",
            matches: 0,
            draws: 0,
            playerAWins: 0,
            playerBWins: 0,
            playerAGoalsFor: 0,
            playerBGoalsFor: 0,
            playerAPoints: 0,
            playerBPoints: 0
          });
        }
        const item = h2hMap.get(key);
        const isA = mp.player_id === ids[0];
        if (isA) {
          item.matches += 1;
          item.playerAGoalsFor += goalsFor;
          item.playerBGoalsFor += goalsAgainst;
          if (result === "win") {
            item.playerAWins += 1;
            item.playerAPoints += 3;
          } else if (result === "draw") {
            item.draws += 1;
            item.playerAPoints += 1;
            item.playerBPoints += 1;
          } else {
            item.playerBWins += 1;
            item.playerBPoints += 3;
          }
        }
      });
    });
  });

  const cleanedPairList = [...pairMap.values()].map(pair => ({
    ...pair,
    matches: Math.round(pair.matches),
    wins: Math.round(pair.wins),
    draws: Math.round(pair.draws),
    losses: Math.round(pair.losses),
    goalsFor: Math.round(pair.goalsFor),
    goalsAgainst: Math.round(pair.goalsAgainst),
    goalDiff: Math.round(pair.goalDiff),
    points: Math.round(pair.points)
  }));

  const playerStatsList = [...playerStatsMap.values()];

  return {
    matches: filteredMatches,
    matchPlayers: filteredMP,
    playerStatsMap,
    playerStatsList,
    pairList: cleanedPairList,
    h2hMap
  };
}

async function loadBaseStatsData() {
  const [{ data: players, error: playersErr }, { data: matches, error: matchesErr }, { data: matchPlayers, error: mpErr }] = await Promise.all([
    supabaseClient.from("tabella").select("id,name").order("name", { ascending: true }),
    supabaseClient.from("matches").select("id,season_id,round,black_score,white_score,created_at").order("created_at", { ascending: false }),
    supabaseClient.from("match_players").select("match_id,player_id,team,tabella(name)")
  ]);

  if (playersErr) console.error(playersErr);
  if (matchesErr) console.error(matchesErr);
  if (mpErr) console.error(mpErr);

  cachedAllPlayers = players || [];
  cachedAllMatches = matches || [];
  cachedAllMatchPlayers = matchPlayers || [];
  clearStatsCaches();
}

async function loadAnnouncementPublic(){
  if (!newsWall) return;

  const { data, error } = await supabaseClient
    .from("announcements")
    .select("id, body, is_pinned, updated_at, created_at")
    .order("is_pinned", { ascending:false })
    .order("updated_at", { ascending:false })
    .limit(1);

  if (error) {
    console.error(error);
    newsWall.innerHTML = `<div class="news-empty">❌ Üzenőfal hiba</div>`;
    return;
  }

  const row = (data || [])[0];
  if (!row) {
    newsWall.innerHTML = `<div class="news-empty">Nincs friss hír.</div>`;
    return;
  }

  newsWall.innerHTML = `
    <div class="news-title">
      <img class="news-icon" src="assets/info.png" alt="Info">
      <span class="news-meta">${new Date(row.updated_at || row.created_at).toLocaleString("hu-HU")}</span>
    </div>
    <div class="news-body">${escapeHtml(row.body)}</div>
  `;
}

async function loadSeasons() {
  const { data, error } = await supabaseClient
    .from("seasons")
    .select("id,year,is_current")
    .order("year", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  seasons = data || [];
  seasonSelect.innerHTML = "";

  seasons.forEach(s => {
    const option = document.createElement("option");
    option.value = s.id;
    option.textContent = s.year + (s.is_current ? " (aktuális)" : "");
    seasonSelect.appendChild(option);
  });

  const current = seasons.find(s => s.is_current) || seasons[0];
  if (current) {
    selectedSeasonId = current.id;
    selectedSeasonYear = current.year;
    seasonSelect.value = current.id;
  }
}

async function loadTable() {
  const { data, error } = await supabaseClient
    .from("season_stats")
    .select("player_id,matches,wins,draws,losses,goals_for,goals_against,goal_diff,points,tabella(name)")
    .eq("season_id", selectedSeasonId)
    .order("points", { ascending: false })
    .order("goal_diff", { ascending: false })
    .order("matches", { ascending: false })
    .order("goals_for", { ascending: false })
    .order("goals_against", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  tbody.innerHTML = "";

  (data || []).forEach((row, index) => {
    const tr = document.createElement("tr");
    const name = row.tabella?.name ?? "";

    tr.innerHTML = `
      <td data-label="">${index + 1}</td>
      <td class="name" data-label="Név">
        <button class="link" data-id="${row.player_id}">${escapeHtml(name)}</button>
      </td>
      <td data-label="M">${row.matches}</td>
      <td data-label="Gy">${row.wins}</td>
      <td data-label="D">${row.draws}</td>
      <td data-label="V">${row.losses}</td>
      <td data-label="LG">${row.goals_for}</td>
      <td data-label="KG">${row.goals_against}</td>
      <td data-label="GK">${row.goal_diff}</td>
      <td data-label="P"><b>${row.points}</b></td>
    `;

    tr.classList.add("updated");
    setTimeout(() => tr.classList.remove("updated"), 1200);

    tbody.appendChild(tr);
  });

  tbody.querySelectorAll("button.link").forEach(button => {
    button.onclick = () => loadPlayerCard(button.dataset.id);
  });
}

function setPlayerContentHeight() {
  playerContent.style.maxHeight = playerContent.scrollHeight + "px";
}

function openPlayerCardIfNeeded() {
  if (!playerCard.classList.contains("is-open")) {
    playerCard.classList.add("is-open");
  }
}

function updatePlayerSwitchUi(){
  playerStatsBtn?.classList.toggle("active", playerCardView === "stats");
  playerRelationsBtn?.classList.toggle("active", playerCardView === "relations");
}

function setPlayerCardView(view){
  playerCardView = view;
  updatePlayerSwitchUi();
  if (selectedPlayerId) {
    loadPlayerCard(selectedPlayerId);
  }
}


async function loadPlayerCard(playerId) {
  selectedPlayerId = playerId;
  const firstOpen = !playerCard.classList.contains("is-open");

  if (playerHint) playerHint.style.display = "none";
  openPlayerCardIfNeeded();

  if (!firstOpen) {
    playerContent.classList.add("is-fading");
  }

  playerContent.innerHTML = `<div class="muted">Betöltés…</div>`;
  requestAnimationFrame(() => setPlayerContentHeight());

  const overallProfile = getPlayerProfileCached(null, playerId);
  const seasonProfile = getPlayerProfileCached(selectedSeasonId, playerId);

  if (!overallProfile?.stats) {
    playerContent.innerHTML = `<div class="muted">Nincs elérhető adat erről a játékosról.</div>`;
    requestAnimationFrame(() => setPlayerContentHeight());
    playerContent.classList.remove("is-fading");
    return;
  }

  const { stats } = overallProfile;
  const form = getPlayerRecentFormCached(playerId);

  const formHtml = form.length
    ? `<div class="form">${form.map(item => `<span class="form-badge ${item.cls}" title="${item.title}">${item.code}</span>`).join("")}</div>`
    : `<div class="form-empty">Még nincs elég meccs a formához.</div>`;

  const seasonTeammate = seasonProfile?.favoriteTeammate;
  const seasonOpponent = seasonProfile?.toughestOpponent;
  const overallTeammate = overallProfile.favoriteTeammate;
  const overallOpponent = overallProfile.toughestOpponent;

  const statsViewHtml = `
    <div style="display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap;">
      <div style="font-size:16px; font-weight:800; letter-spacing:.2px;">${escapeHtml(stats.name)}</div>
      <div class="pill">összesített statisztika</div>
    </div>

    <div class="kv">
      <div>Meccsek</div><div><b>${stats.matches}</b></div>
      <div>⚫ Fekete</div><div><b>${stats.blackCount}</b></div>
      <div>⚪ Fehér</div><div><b>${stats.whiteCount}</b></div>
      <div>Lőtt gól</div><div><b>${stats.goalsFor}</b></div>
      <div>Kapott gól</div><div><b>${stats.goalsAgainst}</b></div>
      <div>Győzelem</div><div><b>${stats.wins}</b></div>
      <div>Döntetlen</div><div><b>${stats.draws}</b></div>
      <div>Vereség</div><div><b>${stats.losses}</b></div>
    </div>

    <div class="form-row">
      <div class="form-title">
        <b>Forma</b>
        <span class="muted">utolsó 5 meccs</span>
      </div>
      ${formHtml}
    </div>
  `;

  const relationsViewHtml = `
    <div style="display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap;">
      <div style="font-size:16px; font-weight:800; letter-spacing:.2px;">${escapeHtml(stats.name)}</div>
<!--       <div class="pill">csapattárs / ellenfél</div> -->
    </div>

    <div class="form-row relation-block first-relation-block">
      <div class="form-title">
        <b>Best Match</b>
      </div>
      <div class="kv">
        <div>Örökmérleg</div>
        <div><b>${overallTeammate ? escapeHtml(overallTeammate.name) : "—"}</b></div>
        <div>Mérleg</div>
        <div><b>${overallTeammate ? formatRecord(overallTeammate) : "—"}</b></div>
        <div>Aktuális idény</div>
        <div><b>${seasonTeammate ? escapeHtml(seasonTeammate.name) : "—"}</b></div>
        <div>Mérleg</div>
        <div><b>${seasonTeammate ? formatRecord(seasonTeammate) : "—"}</b></div>
      </div>
    </div>

    <div class="form-row relation-block">
      <div class="form-title">
        <b>Mumus</b>
      </div>
      <div class="kv">
        <div>Örökmérleg</div>
        <div><b>${overallOpponent ? escapeHtml(overallOpponent.name) : "—"}</b></div>
        <div>Mérleg</div>
        <div><b>${overallOpponent ? formatRecord(overallOpponent) : "—"}</b></div>
        <div>Aktuális idény</div>
        <div><b>${seasonOpponent ? escapeHtml(seasonOpponent.name) : "—"}</b></div>
        <div>Mérleg</div>
        <div><b>${seasonOpponent ? formatRecord(seasonOpponent) : "—"}</b></div>
      </div>
    </div>
  `;

  playerContent.innerHTML = playerCardView === "relations" ? relationsViewHtml : statsViewHtml;

  requestAnimationFrame(() => {
    setPlayerContentHeight();
    playerContent.classList.remove("is-fading");
  });
}

async function loadMatches() {
  const { data: matches, error: matchesError } = await supabaseClient
    .from("matches")
    .select("id,round,black_score,white_score,created_at")
    .eq("season_id", selectedSeasonId)
    .order("round", { ascending: false });

  if (matchesError) {
    console.error(matchesError);
    return;
  }

  allSeasonMatches = matches || [];
  matchesMeta.textContent = allSeasonMatches.length + " összesen";

  availableRounds = [...new Set(allSeasonMatches.map(match => match.round))].sort((a, b) => b - a);
  roundSelect.innerHTML = "";

  availableRounds.forEach(round => {
    const option = document.createElement("option");
    option.value = String(round);
    option.textContent = `${round}. forduló`;
    roundSelect.appendChild(option);
  });

  selectedRound = availableRounds[0] ?? null;
  if (selectedRound !== null) {
    roundSelect.value = String(selectedRound);
  }

  const ids = allSeasonMatches.map(match => match.id);

  if (!ids.length) {
    matchesList.innerHTML = `<div class="muted">Ebben a szezonban még nincs meccs.</div>`;
    return;
  }

  const { data: mp, error: mpError } = await supabaseClient
    .from("match_players")
    .select("match_id,team,tabella(name)")
    .in("match_id", ids);

  if (mpError) {
    console.error(mpError);
    return;
  }

  allSeasonMP = mp || [];
  renderRound();
}

function renderRound() {
  matchesList.innerHTML = "";
  if (selectedRound === null) return;

  const matches = allSeasonMatches.filter(match => match.round == selectedRound);

  matches.forEach(match => {
    const blackNames = allSeasonMP
      .filter(item => item.match_id == match.id && item.team == "black")
      .map(item => item.tabella?.name)
      .filter(Boolean)
      .join(", ");

    const whiteNames = allSeasonMP
      .filter(item => item.match_id == match.id && item.team == "white")
      .map(item => item.tabella?.name)
      .filter(Boolean)
      .join(", ");

    const div = document.createElement("div");
    div.className = "match";
    div.innerHTML = `
      <div class="match-top">
        <div class="score">⚫ ${match.black_score} – ${match.white_score} ⚪</div>
      </div>
      <div class="teams"><span>⚫</span> ${escapeHtml(blackNames || "—")}</div>
      <div class="teams"><span>⚪</span> ${escapeHtml(whiteNames || "—")}</div>
    `;
    matchesList.appendChild(div);
  });

  const index = availableRounds.indexOf(Number(selectedRound));
  prevRoundBtn.disabled = index === availableRounds.length - 1;
  nextRoundBtn.disabled = index === 0;
}

roundSelect.onchange = () => {
  selectedRound = Number(roundSelect.value);
  renderRound();
};

prevRoundBtn.onclick = () => {
  const index = availableRounds.indexOf(Number(selectedRound));
  if (index < availableRounds.length - 1) {
    selectedRound = availableRounds[index + 1];
    roundSelect.value = String(selectedRound);
    renderRound();
  }
};

nextRoundBtn.onclick = () => {
  const index = availableRounds.indexOf(Number(selectedRound));
  if (index > 0) {
    selectedRound = availableRounds[index - 1];
    roundSelect.value = String(selectedRound);
    renderRound();
  }
};

playerStatsBtn?.addEventListener("click", () => setPlayerCardView("stats"));
playerRelationsBtn?.addEventListener("click", () => setPlayerCardView("relations"));
updatePlayerSwitchUi();

seasonSelect.onchange = async () => {
  selectedSeasonId = seasonSelect.value;
  const selectedSeason = seasons.find(item => item.id === selectedSeasonId);
  selectedSeasonYear = selectedSeason ? selectedSeason.year : null;

  await loadTable();
  await loadMatches();
  if (selectedPlayerId) await loadPlayerCard(selectedPlayerId);

  startRealtime();
};

(async () => {
  await loadSeasons();
  await loadBaseStatsData();
  await loadTable();
  await loadMatches();
  await loadAnnouncementPublic();
  startRealtime();
})();
</script>
